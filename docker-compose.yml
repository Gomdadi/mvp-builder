services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      # dockerode가 호스트 Docker 데몬에 접근하기 위해 소켓 마운트
      - /var/run/docker.sock:/var/run/docker.sock
      # sandbox tmpDir을 호스트와 공유 — Docker-in-Docker volume 마운트 경로 일치
      - /tmp:/tmp
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/mvp_builder
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ENDPOINT: http://localstack:4566
    depends_on:
      - postgres
      - redis
      - localstack

  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mvp_builder
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  localstack:
    image: localstack/localstack:3
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
